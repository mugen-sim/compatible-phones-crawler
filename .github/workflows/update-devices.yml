name: Update devices

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build device JSON
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore previously published JSON
        run: |
          # Build the default GitHub Pages URL for user/organization pages and project pages.
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            PUBLISHED_JSON_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/devices.json"
          else
            PUBLISHED_JSON_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/devices.json"
          fi

          # Keep the last published JSON available as a stale fallback when the source blocks CI.
          mkdir -p public
          curl --fail --silent --show-error --location "$PUBLISHED_JSON_URL" --output public/devices.json || true

      - name: Crawl device data
        run: npm run crawl:devices
        env:
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
          CRAWLER_ALLOW_STALE_ON_FAILURE: 'true'
          CRAWLER_BROWSER: browserless
          CRAWLER_NAVIGATION_TIMEOUT_MS: '90000'
          CRAWLER_SECTION_TIMEOUT_MS: '90000'

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
